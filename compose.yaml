# Задача 3: основной compose-файл.
# Через include подключаем стек прокси (nginx ingress + haproxy reverse).
include:
  - proxy.yaml

services:
  # FastAPI-приложение. Образ собирается из Dockerfile.python.
  web:
    build:
      context: .
      dockerfile: Dockerfile.python
    restart: on-failure
    networks:
      backend:
        ipv4_address: 172.20.0.5
    environment:
      # Приложение ходит в БД по сетевому имени сервиса db.
      DB_HOST: db
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
    depends_on:
      - db

  # База данных MySQL 8.
  db:
    image: mysql:8
    restart: on-failure
    networks:
      backend:
        ipv4_address: 172.20.0.10
    environment:
      # Секреты берём из существующего .env (задача 3).
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
